<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth's Memory</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌍 Earth's Memory</h1>
<p class="subtitle">Recording Today for Tomorrow</p>

<div class="score">
<h2>Earth Health Score</h2>
<h1 id="score">89</h1>
</div>

<div class="cards">

<div class="card">
<h3>🌡 Temperature</h3>
<p id="temp">31.2 °C</p>
</div>

<div class="card">
<h3>💧 Humidity</h3>
<p id="humidity">68 %</p>
</div>

<div class="card">
<h3>🌫 Air Quality</h3>
<p id="air">Good</p>
</div>

<div class="card">
<h3>🔊 Noise</h3>
<p id="noise">42 dB</p>
</div>

<div class="card">
<h3>☀ Light</h3>
<p id="light">520 Lux</p>
</div>

<div class="card">
<h3>🌱 Soil Moisture</h3>
<p id="soil">71 %</p>
</div>

</div>

<div class="status">
<h2>Environmental Insight</h2>

<p id="insight">
Environment Stable ✅
</p>

</div>

<button onclick="changeData()">Simulate Sensor Update</button>

</div>

<script src="script.js"></script>

</body>
</html>
